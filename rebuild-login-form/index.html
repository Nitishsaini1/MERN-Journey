<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<body>
    <main>
        <label >User : </label>
        <input type="text" placeholder="Enter user name" class="username">
        <br><br>
        <label >Password : </label>
        <input type="password" placeholder="Enter password" class="password">
        <br><br>
        <button class="login">Log In</button>
        <p class="response"></p>
        <br></br>
        <label >Enter the name</label>
        <input type="text" placeholder="Enter your name" class="name">
        <br></br>
        <button class="button-greet">Greet Me</button>
        <br></br>
        <p class="response-greet"></p>
    </main>   
    <script src="/rebuild-login-form/script.js"></script> 
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do App</title>
    <link rel="stylesheet" href="/rebuild to-do app/style.css">
</head>
<body>

    <main>
        <h1>To Do App</h1>
        <label>Task :</label>
        <input type="text" class="task-input" placeholder="Please Enter the task">
        <br><br>
        <div class="flex"> 
            <div>Warning :</div>
            <div class="warning"></div>
        </div>
        <br>
        <button class="add-task">Add Task</button>
        <br><br>
        <div class="flex">
            <div>Tasks : </div>
            <div class="task-counter"></div>
        </div>
        <br>
         
            <input type="text" placeholder="Please enter the Title" class="search-bar">
            <button class="clear-search">X</button>
        
        <button class="search-title">Search</button>
        <div class="flex">
            <div>Warning :</div>
            <div class="search-warning"></div>
        </div>
        <br><br>
        <div class="flex">
            <button class="all-tasks">All Task</button>
            <button class="pending-task">Pending Tasks</button>
            <button class="complete-task">Complete Tasks</button>
        </div><br>
        <div>Tasks</div>
        <div class="display-tasks"></div>
    </main>

    <script src="/rebuild to-do app/script.js"></script>
</body>
</html>

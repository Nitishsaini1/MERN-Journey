<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Project</title>
    <link rel="stylesheet" href="/Mini-Projects/style.css">
</head>
<body>
    <main >
        <!--Greeting app-->
        <section class="greeting-app">
            <label class="container">Enter Your Name</label> <br><br>
            <input type="text" placeholder="Enter Your Name" class="name-input"><br><br>
            <button class="submit-btn">Greet Me</button><br><br>
            <div class="flex
            ">
            <p class="response"></p><br><br>
        </div>
        </section>

         <!--Age Checker-->
        <section class="agechecker-app">
            <label class="container">Enter Your Age</label><br><br>
            <input type=number placeholder="Enter Your Age" class="age-input"><br><br>
            <button class="submitage-btn">Check Me</button><br><br>
               <div class="flex">
            <p class="responseage"></p>
        </div>
        </section>
    </main>
    <script src="/Mini-Projects/script.js"></script>
</body>
</html>

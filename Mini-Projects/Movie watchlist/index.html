<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie WatchList</title>
</head>
<body>
    <input type="text" placeholder="Enter the movie name" class="movie-input">
    <p class="warning" style="display: inline-block;"></p>
 
    <!-- buttons for some operation -->
     <br><br>
      <button class="push">➕ Add Movie</button>
        <br><br>
        <button class="pop">➖ Remove Last Movie</button>
        <br><br>
        <button class="unshift">⬅️ Add To Front</button><br><br>
        <button class="shift">➡️ Remove Front Movie</button><br><br>
        <div>📋 Current Movie</div>
        <p class="operations"></p>
        <p class="current-movie"></p>
        <script src="/Mini-Projects/Movie watchlist/script.js"></script>
</body>
</html>

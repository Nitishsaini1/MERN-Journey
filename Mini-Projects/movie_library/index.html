<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie LIbrary</title>
</head>
<body>
    <main>
        <label >Movie Name : </label>
        <input type="text" placeholder="Pleae Enter the Movie name" class="movie-name"><br><br>
        <label >Movie rating : </label>
        <input type="number" placeholder="Pleae Enter the rating " class="movie-rating"><br><br>
        <label >Movie year : </label>
        <input type="number" placeholder="Pleae Enter the year" class="movie-year">
        <br><br>
        <label >Movie watch : </label>
        <input type="checkbox" class="movie-watch" >
        <br><br>
        <div class="warning"></div><br><br>
        <button class="add-movie">Submit</button>
        <br><br>
        <p>Current Movie List</p>
        <div class="display-movie"></div>
    </main>
    <script src="/Mini-Projects/movie_library/script.js"></script>
</body>
</html>

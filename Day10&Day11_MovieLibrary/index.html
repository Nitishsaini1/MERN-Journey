<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library</title>
</head>
<body>
    <main>
        <label >Movie Title : </label>
        <input type="text" placeholder="Please Enter Movie name" class="movie-name"><br><br>
        
        <label >Movie Rating : </label>
        <input type="number" placeholder="Please Enter the Rating" class="rating"><br><br>
        
        <label >Year : </label>
        <input type="calender" placeholder="Please Enter Movie Year" class="year-movie"><br><br>
        
        <label >Watched : </label>
        <input type="checkbox"  class="movie-watch"><br><br>
        <div class="warning"></div> <br>
        <button class="add-movie">Add Movie</button>
        <br><br>
        <div>Current Movie List</div>
        <div class="display-movie"></div>
        
    </main>
    <script src="/Day10&Day11_MovieLibrary/script.js"></script>
</body> 
</html>

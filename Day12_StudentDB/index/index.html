<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Database</title>
</head>
<body>
    <main>
        <h1>Student Database</h1>
        <label >Student Name</label><br>
        <input type="text" placeholder="Please enter the name" class="student-name"><br><br>
        <label >Student Age</label><br>
        <input type="number" placeholder="Please enter the age" class="student-age"><br><br>
        <label >Course</label><br>
        <input type="text" placeholder="Please enter the course" class="student-course"><br><br>
        <label >Passed</label><br>
        <input  type="checkbox" class="student-pass"><br><br>
        <div class="warning"></div>
        <button class="add-student">Add Student</button>
        <div class="display-student"></div>
    </main>
    <script src="/Day12_StudentDB/index/script.js"></script>
</body>
</html>
